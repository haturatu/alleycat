services:
  pocketbase:
    build:
      context: ./backend
    restart: always
    ports:
      - "8091:8091"
    environment:
      - SSR_REGEN_URL=http://frontend:8888/__internal/revalidate
      - STATIC_REGEN_TOKEN=${STATIC_REGEN_TOKEN:-}
    volumes:
      - pb_data:/pb/pb_data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  frontend:
    build:
      context: .
      dockerfile: frontend/docker/Dockerfile.site
    restart: always
    ports:
      - "8888:8888"
    environment:
      - LISTEN_ADDR=:8888
      - PB_URL=http://pocketbase:8091
      - STATIC_REGEN_TOKEN=${STATIC_REGEN_TOKEN:-}
    depends_on:
      - pocketbase
      - admin
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  admin:
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile.cms
      args:
        VITE_BASE: /admin/
    restart: always
    ports:
      - "5175:5175"
    depends_on:
      - pocketbase
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

volumes:
  pb_data:
